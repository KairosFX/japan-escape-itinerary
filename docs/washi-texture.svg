<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Subtle washi paper texture">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        1 0 0 0 0.84
        0 1 0 0 0.79
        0 0 1 0 0.72
        0 0 0 0.12 0"/>
    </filter>
    <linearGradient id="paperBase" x1="0%" y1="0%" x2="100%" y2="100%">
