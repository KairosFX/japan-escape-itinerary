<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">洗練した日本旅行ルート参考図</title>
  <desc id="desc">大阪、京都、新大阪、小田原、箱根、富士山エリアへの分岐、東京を、均整の取れたノードと明確な方向で示したルート参考図。</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3c2b23" flood-opacity="0.11"/>
    </filter>
    <marker id="routeArrow" markerWidth="22" markerHeight="22" refX="16" refY="11" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L16 11L2 20" fill="none" stroke="#c85a44" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <circle cx="1062" cy="114" r="40" fill="#f3ddd4" opacity="0.16"/>
  <circle cx="122" cy="446" r="48" fill="#dfe8e2" opacity="0.14"/>

  <g font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="108" y="118" fill="#c85a44" font-size="18" font-weight="700" letter-spacing="2.4">移動方向</text>
    <text x="216" y="118" fill="#c85a44" font-size="22" font-weight="700">→</text>
  </g>

  <g fill="none" stroke="#c85a44" stroke-width="8.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M175 306H326" marker-end="url(#routeArrow)"/>
    <path d="M365 306H516" marker-end="url(#routeArrow)"/>
    <path d="M555 306H706" marker-end="url(#routeArrow)"/>
    <path d="M745 306H896" marker-end="url(#routeArrow)"/>
    <path d="M935 319V376" marker-end="url(#routeArrow)"/>
    <path d="M954 389H1023" marker-end="url(#routeArrow)"/>
    <path d="M1062 376V319" marker-end="url(#routeArrow)"/>
  </g>

  <g fill="#c85a44" stroke="#fffdfa" stroke-width="4.5">
    <circle cx="160" cy="306" r="14"/>
    <circle cx="350" cy="306" r="14"/>
    <circle cx="540" cy="306" r="14"/>
    <circle cx="730" cy="306" r="14"/>
    <circle cx="920" cy="306" r="14"/>
    <circle cx="920" cy="389" r="14"/>
    <circle cx="1045" cy="389" r="14"/>
    <circle cx="1045" cy="306" r="14"/>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="160" y="224" font-size="46" font-weight="700">大阪</text>
    <text x="350" y="224" font-size="46" font-weight="700">京都</text>
    <text x="540" y="226" font-size="34" font-weight="600">新大阪</text>
    <text x="730" y="226" font-size="34" font-weight="600">小田原</text>
    <text x="920" y="226" font-size="34" font-weight="600">箱根</text>
    <text x="1045" y="224" font-size="46" font-weight="700">東京</text>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="920" y="452" font-size="30" font-weight="700">富士山エリア</text>
    <text x="920" y="482" font-size="18" font-weight="500" fill="#677173">河口湖 / 忍野八海</text>
  </g>
</svg>
