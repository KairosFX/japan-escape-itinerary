<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">洗練した日本旅行ルート参考図</title>
  <desc id="desc">大阪、京都、小田原、箱根、東京を主な流れとして示し、箱根から直接分かれる富士山エリアへの任意寄り道を東京前に示した参考図。</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3c2b23" flood-opacity="0.11"/>
    </filter>
    <style>
      .route-hit-area {
        fill: transparent;
        cursor: pointer;
        pointer-events: all;
      }

      .route-direction,
      .route-icons,
      .route-main,
      .route-branch,
      .route-branch-label {
        pointer-events: none;
      }

      .route-branch-line,
      .route-node--hakone,
      .route-node--fuji,
      .route-label--hakone,
      .route-label--fuji,
      .route-note--fuji,
      .route-icon--hakone,
      .route-icon--fuji {
        transition:
          stroke 180ms ease,
          fill 180ms ease,
          opacity 180ms ease,
          transform 180ms ease;
        transform-origin: center;
      }

      .route-hit-area--hakone:hover ~ .route-branch .route-branch-line,
      .route-hit-area--fuji:hover ~ .route-branch .route-branch-line {
        stroke: #b54131;
        opacity: 1;
      }

      .route-hit-area--hakone:hover ~ .route-main .route-node--hakone,
      .route-hit-area--fuji:hover ~ .route-main .route-node--hakone,
      .route-hit-area--hakone:hover ~ .route-branch .route-node--fuji,
      .route-hit-area--fuji:hover ~ .route-branch .route-node--fuji {
        fill: #b54131;
      }

      .route-hit-area--hakone:hover ~ .route-main .route-label--hakone,
      .route-hit-area--fuji:hover ~ .route-main .route-label--hakone,
      .route-hit-area--hakone:hover ~ .route-branch-label .route-label--fuji,
      .route-hit-area--fuji:hover ~ .route-branch-label .route-label--fuji {
        fill: #b54131;
      }

      .route-hit-area--hakone:hover ~ .route-branch-label .route-note--fuji,
      .route-hit-area--fuji:hover ~ .route-branch-label .route-note--fuji {
        fill: #8f2e22;
      }

      .route-hit-area--hakone:hover ~ .route-icons .route-icon--hakone,
      .route-hit-area--fuji:hover ~ .route-icons .route-icon--hakone,
      .route-hit-area--hakone:hover ~ .route-icons .route-icon--fuji,
      .route-hit-area--fuji:hover ~ .route-icons .route-icon--fuji {
        stroke: #b54131;
        opacity: 1;
      }

      .route-hit-area--hakone:hover ~ .route-branch-label .route-label--fuji,
      .route-hit-area--fuji:hover ~ .route-branch-label .route-label--fuji {
        transform: translateY(-1px);
      }
    </style>
    <marker id="routeArrow" markerWidth="13.5" markerHeight="13.5" refX="10.5" refY="6.75" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L10.5 6.75L2 11.5" fill="none" stroke="#c85a44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="detourArrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L10 6.5L2 11" fill="none" stroke="#dc9e8b" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <circle cx="1062" cy="112" r="40" fill="#f3ddd4" opacity="0.03"/>
  <circle cx="124" cy="444" r="48" fill="#dfe8e2" opacity="0.03"/>

  <g class="route-direction" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="108" y="118" fill="#c85a44" font-size="18" font-weight="700" letter-spacing="2.4">移動方向</text>
    <text x="216" y="118" fill="#c85a44" font-size="22" font-weight="700">→</text>
    <text x="160" y="164" fill="#c85a44" font-size="16" font-weight="700" letter-spacing="2">出発</text>
    <text x="1084" y="164" text-anchor="middle" fill="#c85a44" font-size="16" font-weight="700" letter-spacing="2">到着</text>
  </g>

  <rect class="route-hit-area route-hit-area--hakone" x="748" y="160" width="148" height="284" rx="30"/>
  <rect class="route-hit-area route-hit-area--fuji" x="846" y="404" width="196" height="122" rx="26"/>

  <g class="route-icons" fill="none" stroke="#b86552" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.86">
    <g class="route-icon--kyoto">
      <path d="M352 166H408"/>
      <path d="M360 166L380 152L400 166"/>
      <path d="M366 166V176"/>
      <path d="M394 166V176"/>
      <path d="M366 176H394"/>
    </g>

    <g class="route-icon--odawara">
      <rect x="584" y="154" width="32" height="16" rx="4"/>
      <path d="M592 162H608"/>
      <path d="M590 170H610"/>
      <path d="M590 170L586 176"/>
      <path d="M610 170L614 176"/>
    </g>

    <g class="route-icon--hakone">
      <path d="M804 176V156"/>
      <path d="M836 176V156"/>
      <path d="M798 156H842"/>
      <path d="M802 148H838"/>
      <path d="M810 168H830"/>
    </g>

    <g class="route-icon--fuji">
      <path d="M918 454L934 432L950 454Z"/>
      <path d="M930 432L946 454"/>
    </g>
  </g>

  <g class="route-main" fill="none" stroke="#c85a44" stroke-width="8.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M175 322H356" marker-end="url(#routeArrow)"/>
    <path d="M395 322H576" marker-end="url(#routeArrow)"/>
    <path d="M615 322H796" marker-end="url(#routeArrow)"/>
    <path d="M835 322H1060" marker-end="url(#routeArrow)"/>
  </g>

  <g class="route-branch" fill="none" stroke="#dc9e8b" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 10">
    <path class="route-branch-line" d="M826 338C828 378 860 410 924 426" marker-end="url(#detourArrow)"/>
    <path class="route-branch-line" d="M950 426C1022 426 1062 392 1072 344" marker-end="url(#detourArrow)"/>
  </g>

  <g class="route-main" fill="#c85a44" stroke="#fffdfa" stroke-width="4.5">
    <circle cx="160" cy="322" r="14"/>
    <circle cx="380" cy="322" r="14"/>
    <circle cx="600" cy="322" r="14"/>
    <circle class="route-node--hakone" cx="820" cy="322" r="14"/>
    <circle cx="1084" cy="322" r="14"/>
  </g>

  <g class="route-branch" fill="#dc9e8b" stroke="#fffdfa" stroke-width="4.5">
    <circle class="route-node--fuji" cx="936" cy="428" r="12"/>
  </g>

  <g class="route-main" fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="160" y="202" font-size="46" font-weight="700">大阪</text>
    <text x="380" y="202" font-size="46" font-weight="700">京都</text>
    <text x="600" y="204" font-size="30" font-weight="500">小田原</text>
    <text class="route-label--hakone" x="820" y="202" font-size="38" font-weight="650">箱根</text>
    <text x="1084" y="202" font-size="46" font-weight="700">東京</text>
  </g>

  <g class="route-branch-label" fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text class="route-label--fuji" x="936" y="478" font-size="30" font-weight="700">富士山エリア</text>
    <text class="route-note--fuji" x="936" y="508" font-size="18" font-weight="500" fill="#677173">任意の立ち寄り</text>
  </g>
</svg>
