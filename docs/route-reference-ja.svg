<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">日本旅行のルート参考図</title>
  <desc id="desc">大阪、京都、小田原、箱根、富士山、東京の各停留点をホバーラベル付きで示し、箱根から分かれる富士山の寄り道ルートを、淡い日本風景の背景に重ねたルート図です。</desc>
  <defs>
    <filter id="panelShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#281d18" flood-opacity="0.11"/>
    </filter>
    <linearGradient id="panelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf8"/>
      <stop offset="56%" stop-color="#f8f3ec"/>
      <stop offset="100%" stop-color="#f1e9df"/>
    </linearGradient>
    <linearGradient id="trackTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ab4a3b"/>
      <stop offset="100%" stop-color="#ba5849"/>
    </linearGradient>
    <clipPath id="panelClip">
      <rect x="86" y="84" width="1028" height="392" rx="26"/>
    </clipPath>
    <style>
      .scene,
      .route-static,
      .tooltip,
      .stop-label {
        pointer-events: none;
      }

      .interactive {
        cursor: pointer;
      }

      .hit-area {
        fill: transparent;
        pointer-events: all;
      }

      .node,
      .node-halo,
      .route-main-animated,
      .progress-segment,
      .node-progress-track,
      .node-progress,
      .tooltip-ui,
      .branch-line,
      .fuji-node,
      .fuji-label {
        transition:
          opacity 180ms ease,
          fill 180ms ease,
          stroke 180ms ease,
          transform 180ms ease;
        transform-box: fill-box;
        transform-origin: center;
      }

      .progress-segment,
      .node-progress-track,
      .node-progress {
        fill: none;
      }

      .node-halo {
        opacity: 0;
      }

      .progress-segment {
        opacity: 0;
        stroke: #8e352b;
        stroke-width: 9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .progress-segment--branch {
        stroke-width: 4;
        stroke-dasharray: 6 8;
      }

      .progress-segment.is-complete {
        opacity: 1;
      }

      .route-stop .node-progress-track {
        opacity: 0.4;
        stroke: #e6d3c8;
        stroke-width: 3;
      }

      .route-stop .node-progress {
        opacity: 0;
        stroke: #8e352b;
        stroke-width: 3;
        stroke-linecap: round;
      }

      .route-stop.has-progress .node-progress {
        opacity: 1;
      }

      .route-stop.has-progress .node,
      .route-stop.has-progress .fuji-node {
        fill: #9e4335;
      }

      .route-stop.is-complete .node,
      .route-stop.is-complete .fuji-node {
        fill: #8e352b;
      }

      .route-stop.is-warning .node,
      .route-stop.is-warning .fuji-node {
        fill: #c28a43;
      }

      .route-stop.is-warning .node-progress {
        stroke: #c28a43;
      }

      .route-stop.is-locked .node,
      .route-stop.is-locked .fuji-node {
        fill: #d7cbc2;
      }

      .route-stop.is-locked .node-progress-track {
        opacity: 0.24;
      }

      .route-stop.is-current .node-halo {
        opacity: 0.12;
        transform: scale(1.16);
      }

      .route-main-animated {
        stroke-dasharray: 860;
        stroke-dashoffset: 860;
        animation: routeDraw 1280ms cubic-bezier(0.22, 1, 0.36, 1) 180ms forwards;
      }

      .branch-line {
        opacity: 0;
        animation: routeBranchReveal 460ms cubic-bezier(0.22, 1, 0.36, 1) 1120ms forwards;
      }

      .route-arrow {
        opacity: 0;
        animation: routeArrowIn 240ms ease forwards;
      }

      .route-arrow--1 {
        animation-delay: 880ms;
      }

      .route-arrow--2 {
        animation-delay: 980ms;
      }

      .route-arrow--3 {
        animation-delay: 1080ms;
      }

      .route-arrow--4 {
        animation-delay: 1180ms;
      }

      .node,
      .fuji-node {
        opacity: 0;
        animation: routeNodeIn 280ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .node--1 {
        animation-delay: 980ms;
      }

      .node--2 {
        animation-delay: 1060ms;
      }

      .node--3 {
        animation-delay: 1140ms;
      }

      .node--4 {
        animation-delay: 1220ms;
      }

      .node--5 {
        animation-delay: 1300ms;
      }

      .node--fuji {
        animation-delay: 1420ms;
      }

      .tooltip-ui {
        opacity: 0;
        transform: translateY(8px);
      }

      .interactive:hover .node,
      .interactive:active .node {
        fill: #8e352b;
        transform: scale(1.12);
      }

      .interactive:hover .node-halo,
      .interactive:active .node-halo {
        opacity: 0.18;
        transform: scale(1.28);
      }

      .interactive:hover .tooltip-ui,
      .interactive:active .tooltip-ui {
        opacity: 1;
        transform: translateY(0);
      }

      .branch-cluster:hover .branch-line,
      .branch-cluster:active .branch-line {
        stroke: #8e352b;
        opacity: 1;
      }

      .branch-cluster:hover .fuji-node,
      .branch-cluster:hover .fuji-label,
      .branch-cluster:active .fuji-node,
      .branch-cluster:active .fuji-label {
        stroke: #8e352b;
        fill: #8e352b;
      }

      .branch-cluster:hover .fuji-label,
      .branch-cluster:active .fuji-label {
        transform: translateY(-2px);
      }

      .branch-cluster:hover .fuji-label,
      .branch-cluster:active .fuji-label {
        fill: #8e352b;
      }

      .route-stop.is-celebrating .node,
      .route-stop.is-celebrating .fuji-node,
      .progress-segment.is-celebrating {
        animation-duration: 860ms;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }

      .route-stop.is-celebrating .node,
      .route-stop.is-celebrating .fuji-node {
        animation-name: routeStopCelebrate;
      }

      .route-stop.is-celebrating .node-progress {
        animation: routeRingCelebrate 860ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .progress-segment.is-celebrating {
        animation-name: routeSegmentCelebrate;
      }

      @keyframes routeDraw {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes routeBranchReveal {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }

        to {
          opacity: 0.92;
          transform: translateY(0);
        }
      }

      @keyframes routeArrowIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes routeNodeIn {
        from {
          opacity: 0;
          transform: scale(0.72);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes routeStopCelebrate {
        0%,
        100% {
          transform: scale(1);
        }

        38% {
          transform: scale(1.22);
        }
      }

      @keyframes routeSegmentCelebrate {
        0%,
        100% {
          opacity: 1;
          stroke-width: 9;
        }

        38% {
          opacity: 1;
          stroke-width: 12;
        }
      }

      @keyframes routeRingCelebrate {
        0%,
        100% {
          opacity: 1;
          stroke-width: 3;
        }

        38% {
          opacity: 1;
          stroke-width: 5;
        }
      }
    </style>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="30" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <g clip-path="url(#panelClip)" class="scene">
    <rect x="86" y="84" width="1028" height="392" rx="26" fill="url(#panelSky)"/>
    <circle cx="994" cy="136" r="66" fill="#f1dcd3" opacity="0.22"/>
    <path d="M86 444C222 404 364 406 506 438C664 474 840 480 1114 430V476H86Z" fill="#ebf0e8"/>
    <path d="M86 454C224 426 374 428 542 456C724 486 906 488 1114 444V476H86Z" fill="#e2e9e2"/>
    <path d="M104 184C130 196 148 214 170 246" fill="none" stroke="#d5b7ae" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
    <circle cx="116" cy="192" r="11" fill="#f6e1db" opacity="0.66"/>
    <circle cx="138" cy="208" r="9" fill="#f8e9e3" opacity="0.74"/>
    <circle cx="158" cy="226" r="10" fill="#f6e1db" opacity="0.64"/>
    <circle cx="178" cy="246" r="8" fill="#f8e9e3" opacity="0.72"/>
    <path d="M746 186C792 172 844 174 890 188" fill="none" stroke="#ebe1d6" stroke-width="10" stroke-linecap="round" opacity="0.36"/>
    <path d="M704 214C758 198 824 200 884 216" fill="none" stroke="#ebe1d6" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
  </g>

  <g class="route-static" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="126" y="126" fill="#ab4a3b" font-size="18" font-weight="700" letter-spacing="2.4">移動ルート</text>
    <text x="248" y="126" fill="#ab4a3b" font-size="20" font-weight="700">→</text>
    <text x="188" y="152" text-anchor="middle" fill="#ab4a3b" font-size="15" font-weight="700" letter-spacing="1.8">出発</text>
    <text x="1008" y="152" text-anchor="middle" fill="#ab4a3b" font-size="15" font-weight="700" letter-spacing="1.8">到着</text>
  </g>

  <g class="route-static" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 320H1020" stroke="#b79d90" stroke-width="16" opacity="0.14"/>
    <path class="route-main-animated" d="M176 320H1020" stroke="url(#trackTint)" stroke-width="8"/>
    <path class="route-main-animated" d="M176 320H1020" stroke="#eb9a84" stroke-width="2.4" opacity="0.42"/>
    <path id="route-progress-kyoto" class="progress-segment" d="M188 320H392"/>
    <path id="route-progress-odawara" class="progress-segment" d="M392 320H596"/>
    <path id="route-progress-hakone" class="progress-segment" d="M596 320H800"/>
    <path id="route-progress-tokyo" class="progress-segment" d="M800 320H1008"/>
    <path class="route-arrow route-arrow--1" d="M277 311L287 320L277 329" stroke="#8e352b" stroke-width="3.8"/>
    <path class="route-arrow route-arrow--2" d="M481 311L491 320L481 329" stroke="#8e352b" stroke-width="3.8"/>
    <path class="route-arrow route-arrow--3" d="M685 311L695 320L685 329" stroke="#8e352b" stroke-width="3.8"/>
    <path class="route-arrow route-arrow--4" d="M889 311L899 320L889 329" stroke="#8e352b" stroke-width="3.8"/>
  </g>

  <g class="interactive route-stop" id="route-stop-osaka" data-scroll-day="1" tabindex="0" role="link" aria-label="1日目のチェックリストを開く" transform="translate(188 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-88 -112)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="176" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M82 58L88 66L94 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="88" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">大阪</text>
        <text x="88" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">1日目・3日目の拠点</text>
      </g>
    </g>
    <circle class="node-progress-track" r="18"/>
    <circle class="node-progress" r="18" data-circumference="113.097" stroke-dasharray="113.097" stroke-dashoffset="113.097" transform="rotate(-90)"/>
    <circle class="node-halo" r="22" fill="#ab4a3b"/>
    <circle class="node node--1" r="11.5" fill="#b25041" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="interactive route-stop" id="route-stop-kyoto" data-scroll-day="2" tabindex="0" role="link" aria-label="2日目のチェックリストを開く" transform="translate(392 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-94 -112)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="188" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M88 58L94 66L100 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="94" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">京都</text>
        <text x="94" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">2日目・文化と自然</text>
      </g>
    </g>
    <circle class="node-progress-track" r="18"/>
    <circle class="node-progress" r="18" data-circumference="113.097" stroke-dasharray="113.097" stroke-dashoffset="113.097" transform="rotate(-90)"/>
    <circle class="node-halo" r="22" fill="#ab4a3b"/>
    <circle class="node node--2" r="11.5" fill="#b25041" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="interactive route-stop" id="route-stop-odawara" data-scroll-day="4" tabindex="0" role="link" aria-label="4日目のチェックリストを開く" transform="translate(596 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-88 -112)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="176" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M82 58L88 66L94 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="88" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">小田原</text>
        <text x="88" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">4日目・乗り換え</text>
      </g>
    </g>
    <circle class="node-progress-track" r="18"/>
    <circle class="node-progress" r="18" data-circumference="113.097" stroke-dasharray="113.097" stroke-dashoffset="113.097" transform="rotate(-90)"/>
    <circle class="node-halo" r="22" fill="#ab4a3b"/>
    <circle class="node node--3" r="11.5" fill="#b25041" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="branch-cluster">
    <path class="branch-line" d="M800 332C806 376 838 402 878 410" fill="none" stroke="#d0a08f" stroke-width="3.1" stroke-dasharray="6 8" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
    <path id="route-progress-fuji" class="progress-segment progress-segment--branch" d="M800 332C806 376 838 402 878 410"/>

    <g class="interactive route-stop" id="route-stop-hakone" data-scroll-day="4" tabindex="0" role="link" aria-label="4日目のチェックリストを開く" transform="translate(800 320)">
      <circle class="hit-area" r="40"/>
      <g transform="translate(-98 -112)">
        <g class="tooltip-ui tooltip">
          <rect x="0" y="0" width="196" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
          <path d="M92 58L98 66L104 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
          <text x="98" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">箱根</text>
          <text x="98" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">4-5日目・景色と滞在</text>
        </g>
      </g>
      <circle class="node-progress-track" r="18"/>
      <circle class="node-progress" r="18" data-circumference="113.097" stroke-dasharray="113.097" stroke-dashoffset="113.097" transform="rotate(-90)"/>
      <circle class="node-halo" r="22" fill="#ab4a3b"/>
      <circle class="node node--4" r="11.5" fill="#b25041" stroke="#fffdfa" stroke-width="4"/>
    </g>

    <g class="interactive route-stop fuji-group" id="route-stop-fuji" data-scroll-day="6" tabindex="0" role="link" aria-label="6日目のチェックリストを開く" transform="translate(878 410)">
      <circle class="hit-area" r="38"/>
      <g transform="translate(-88 -110)">
        <g class="tooltip-ui tooltip">
          <rect x="0" y="0" width="176" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
          <path d="M82 58L88 66L94 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
          <text x="88" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">富士山</text>
          <text x="88" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">6日目・景色の寄り道</text>
        </g>
      </g>
      <circle class="node-progress-track" r="17"/>
      <circle class="node-progress" r="17" data-circumference="106.814" stroke-dasharray="106.814" stroke-dashoffset="106.814" transform="rotate(-90)"/>
      <circle class="node-halo" r="21" fill="#d0a08f"/>
      <circle class="fuji-node node--fuji" r="11.5" fill="#d0a08f" stroke="#fffdfa" stroke-width="4"/>
      <text class="fuji-label" x="0" y="62" text-anchor="middle" fill="#404548" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="21" font-weight="600">富士山</text>
    </g>
  </g>

  <g class="interactive route-stop" id="route-stop-tokyo" data-scroll-day="7" tabindex="0" role="link" aria-label="7日目のチェックリストを開く" transform="translate(1008 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-94 -112)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="188" height="58" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M88 58L94 66L100 58Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="94" y="24" text-anchor="middle" fill="#2b2f31" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" font-weight="600">東京</text>
        <text x="94" y="42" text-anchor="middle" fill="#6b7374" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="12.5" font-weight="600">7-9日目・旅の締め</text>
      </g>
    </g>
    <circle class="node-progress-track" r="18"/>
    <circle class="node-progress" r="18" data-circumference="113.097" stroke-dasharray="113.097" stroke-dashoffset="113.097" transform="rotate(-90)"/>
    <circle class="node-halo" r="22" fill="#ab4a3b"/>
    <circle class="node node--5" r="11.5" fill="#b25041" stroke="#fffdfa" stroke-width="4"/>
  </g>
</svg>
