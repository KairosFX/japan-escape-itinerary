<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">洗練した日本旅行ルート参考図</title>
  <desc id="desc">大阪から東京までの主な移動ルートと、箱根から分かれる富士山エリアの点線寄り道を示した参考図。</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3c2b23" flood-opacity="0.11"/>
    </filter>
    <marker id="routeArrow" markerWidth="19" markerHeight="19" refX="14" refY="9.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L14 9.5L2 17" fill="none" stroke="#c85a44" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="detourArrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L12 8L2 14" fill="none" stroke="#dc9e8b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <circle cx="1062" cy="114" r="40" fill="#f3ddd4" opacity="0.05"/>
  <circle cx="122" cy="446" r="48" fill="#dfe8e2" opacity="0.05"/>

  <g font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="108" y="118" fill="#c85a44" font-size="18" font-weight="700" letter-spacing="2.4">移動方向</text>
    <text x="216" y="118" fill="#c85a44" font-size="22" font-weight="700">→</text>
  </g>

  <g fill="none" stroke="#c85a44" stroke-width="8.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M175 320H326" marker-end="url(#routeArrow)"/>
    <path d="M365 320H516" marker-end="url(#routeArrow)"/>
    <path d="M555 320H706" marker-end="url(#routeArrow)"/>
    <path d="M745 320H896" marker-end="url(#routeArrow)"/>
    <path d="M935 320H1038" marker-end="url(#routeArrow)"/>
  </g>

  <g fill="none" stroke="#dc9e8b" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 12">
    <path d="M920 334V386" marker-end="url(#detourArrow)"/>
  </g>

  <g fill="#c85a44" stroke="#fffdfa" stroke-width="4.5">
    <circle cx="160" cy="320" r="14"/>
    <circle cx="350" cy="320" r="14"/>
    <circle cx="540" cy="320" r="14"/>
    <circle cx="730" cy="320" r="14"/>
    <circle cx="920" cy="320" r="14"/>
    <circle cx="920" cy="398" r="12" fill="#dc9e8b"/>
    <circle cx="1052" cy="320" r="14"/>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="160" y="208" font-size="46" font-weight="700">大阪</text>
    <text x="350" y="208" font-size="46" font-weight="700">京都</text>
    <text x="540" y="210" font-size="31" font-weight="500" fill="#474f52">新大阪</text>
    <text x="730" y="210" font-size="34" font-weight="580">小田原</text>
    <text x="920" y="210" font-size="34" font-weight="580">箱根</text>
    <text x="1052" y="208" font-size="46" font-weight="700">東京</text>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="920" y="454" font-size="30" font-weight="700">富士山エリア</text>
    <text x="920" y="484" font-size="18" font-weight="500" fill="#677173">任意の寄り道: 河口湖 / 忍野八海</text>
  </g>
</svg>
