<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">日本旅行の線型ルート参考図</title>
  <desc id="desc">大阪、京都、新大阪、小田原、箱根、富士山エリア、東京を示した、見やすい線型ルート参考図。</desc>
  <defs>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6c4c37" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f7f0e6"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#eaded0" stroke-width="2"/>
  </g>

  <circle cx="1026" cy="114" r="78" fill="#f6e4dd" opacity="0.7"/>
  <circle cx="170" cy="438" r="92" fill="#e7efeb" opacity="0.8"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M140 312H1060" stroke="#d6c7bb" stroke-width="4"/>

    <path d="M214 296L236 312L214 328" stroke="#c55443" stroke-width="6"/>
    <path d="M388 296L410 312L388 328" stroke="#c55443" stroke-width="6"/>
    <path d="M598 296L620 312L598 328" stroke="#c55443" stroke-width="6"/>
    <path d="M790 296L812 312L790 328" stroke="#c55443" stroke-width="6"/>
    <path d="M970 296L992 312L970 328" stroke="#c55443" stroke-width="6"/>

    <circle cx="260" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="462" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="672" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
    <circle cx="858" cy="312" r="5" fill="#fffdfa" stroke="#c55443" stroke-width="3"/>
  </g>

  <g fill="#24282b">
    <text x="126" y="322" text-anchor="end" font-size="50" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">大阪</text>

    <text x="250" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">京都</text>
    <text x="486" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">新大阪</text>
    <text x="676" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">小田原</text>
    <text x="860" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">箱根</text>
    <text x="1040" y="250" text-anchor="middle" font-size="42" font-weight="700" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">東京</text>
  </g>

  <g>
    <rect x="800" y="352" width="186" height="58" rx="29" fill="#f1e6db" stroke="#e3d3c5" stroke-width="2"/>
    <text x="893" y="389" text-anchor="middle" fill="#3d4748" font-size="32" font-weight="600" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">富士山エリア</text>
  </g>
</svg>
