<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Route reference for the Japan trip</title>
  <desc id="desc">A refined rail-style route map with hover labels for Osaka, Kyoto, Odawara, Hakone, and Tokyo, plus a cleaner Mt. Fuji branch from Hakone on a subtle Japanese scenery background.</desc>
  <defs>
    <filter id="panelShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#281d18" flood-opacity="0.11"/>
    </filter>
    <linearGradient id="panelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf8"/>
      <stop offset="56%" stop-color="#f8f3ec"/>
      <stop offset="100%" stop-color="#f1e9df"/>
    </linearGradient>
    <linearGradient id="trackTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c85a44"/>
      <stop offset="100%" stop-color="#cf6d53"/>
    </linearGradient>
    <clipPath id="panelClip">
      <rect x="86" y="84" width="1028" height="392" rx="26"/>
    </clipPath>
    <style>
      .scene,
      .route-static,
      .tooltip,
      .fuji-group,
      .stop-label {
        pointer-events: none;
      }

      .interactive {
        cursor: pointer;
      }

      .hit-area {
        fill: transparent;
        pointer-events: all;
      }

      .node,
      .node-halo,
      .tooltip-ui,
      .branch-line,
      .fuji-node,
      .fuji-icon,
      .fuji-label {
        transition:
          opacity 180ms ease,
          fill 180ms ease,
          stroke 180ms ease,
          transform 180ms ease;
        transform-box: fill-box;
        transform-origin: center;
      }

      .node-halo {
        opacity: 0;
      }

      .tooltip-ui {
        opacity: 0;
        transform: translateY(8px);
      }

      .interactive:hover .node,
      .interactive:active .node {
        fill: #b54131;
        transform: scale(1.12);
      }

      .interactive:hover .node-halo,
      .interactive:active .node-halo {
        opacity: 0.18;
        transform: scale(1.28);
      }

      .interactive:hover .tooltip-ui,
      .interactive:active .tooltip-ui {
        opacity: 1;
        transform: translateY(0);
      }

      .branch-cluster:hover .branch-line,
      .branch-cluster:active .branch-line {
        stroke: #b54131;
        opacity: 1;
      }

      .branch-cluster:hover .fuji-node,
      .branch-cluster:hover .fuji-label,
      .branch-cluster:hover .fuji-icon,
      .branch-cluster:active .fuji-node,
      .branch-cluster:active .fuji-label,
      .branch-cluster:active .fuji-icon {
        stroke: #b54131;
        fill: #b54131;
      }

      .branch-cluster:hover .fuji-icon,
      .branch-cluster:hover .fuji-label,
      .branch-cluster:active .fuji-icon,
      .branch-cluster:active .fuji-label {
        transform: translateY(-2px);
      }

      .branch-cluster:hover .fuji-label,
      .branch-cluster:active .fuji-label {
        fill: #b54131;
      }
    </style>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="30" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <g clip-path="url(#panelClip)" class="scene">
    <rect x="86" y="84" width="1028" height="392" rx="26" fill="url(#panelSky)"/>
    <circle cx="994" cy="136" r="66" fill="#f1dcd3" opacity="0.22"/>
    <path d="M86 444C222 404 364 406 506 438C664 474 840 480 1114 430V476H86Z" fill="#ebf0e8"/>
    <path d="M86 454C224 426 374 428 542 456C724 486 906 488 1114 444V476H86Z" fill="#e2e9e2"/>
    <path d="M104 184C130 196 148 214 170 246" fill="none" stroke="#d5b7ae" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
    <circle cx="116" cy="192" r="11" fill="#f6e1db" opacity="0.66"/>
    <circle cx="138" cy="208" r="9" fill="#f8e9e3" opacity="0.74"/>
    <circle cx="158" cy="226" r="10" fill="#f6e1db" opacity="0.64"/>
    <circle cx="178" cy="246" r="8" fill="#f8e9e3" opacity="0.72"/>
    <path d="M746 186C792 172 844 174 890 188" fill="none" stroke="#ebe1d6" stroke-width="10" stroke-linecap="round" opacity="0.36"/>
    <path d="M704 214C758 198 824 200 884 216" fill="none" stroke="#ebe1d6" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
  </g>

  <g class="route-static" font-family="'Avenir Next', 'Hiragino Sans', sans-serif">
    <text x="126" y="126" fill="#c85a44" font-size="18" font-weight="700" letter-spacing="2.8">TRAVEL DIRECTION</text>
    <text x="404" y="126" fill="#c85a44" font-size="20" font-weight="700">→</text>
    <text x="188" y="152" text-anchor="middle" fill="#c85a44" font-size="15" font-weight="700" letter-spacing="1.8">START</text>
    <text x="1008" y="152" text-anchor="middle" fill="#c85a44" font-size="15" font-weight="700" letter-spacing="1.8">END</text>
  </g>

  <g class="route-static" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 320H1020" stroke="#b79d90" stroke-width="16" opacity="0.14"/>
    <path d="M176 320H1020" stroke="url(#trackTint)" stroke-width="8"/>
    <path d="M176 320H1020" stroke="#eb9a84" stroke-width="2.4" opacity="0.42"/>
    <path d="M277 311L287 320L277 329" stroke="#b54131" stroke-width="3.8"/>
    <path d="M481 311L491 320L481 329" stroke="#b54131" stroke-width="3.8"/>
    <path d="M685 311L695 320L685 329" stroke="#b54131" stroke-width="3.8"/>
    <path d="M889 311L899 320L889 329" stroke="#b54131" stroke-width="3.8"/>
  </g>

  <g class="interactive" transform="translate(188 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-56 -96)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="112" height="42" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M50 42L56 50L62 42Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="56" y="26" text-anchor="middle" fill="#2b2f31" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="16" font-weight="600">Osaka</text>
      </g>
    </g>
    <circle class="node-halo" r="22" fill="#c85a44"/>
    <circle class="node" r="11.5" fill="#cb5e47" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="interactive" transform="translate(392 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-56 -96)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="112" height="42" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M50 42L56 50L62 42Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="56" y="26" text-anchor="middle" fill="#2b2f31" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="16" font-weight="600">Kyoto</text>
      </g>
    </g>
    <circle class="node-halo" r="22" fill="#c85a44"/>
    <circle class="node" r="11.5" fill="#cb5e47" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="interactive" transform="translate(596 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-68 -96)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="136" height="42" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M62 42L68 50L74 42Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="68" y="26" text-anchor="middle" fill="#2b2f31" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="16" font-weight="600">Odawara</text>
      </g>
    </g>
    <circle class="node-halo" r="22" fill="#c85a44"/>
    <circle class="node" r="11.5" fill="#cb5e47" stroke="#fffdfa" stroke-width="4"/>
  </g>

  <g class="branch-cluster">
    <path class="branch-line" d="M800 332C804 364 834 388 878 398" fill="none" stroke="#d59a86" stroke-width="3" stroke-dasharray="6 8" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

    <g class="interactive" transform="translate(800 320)">
      <circle class="hit-area" r="40"/>
      <g transform="translate(-62 -96)">
        <g class="tooltip-ui tooltip">
          <rect x="0" y="0" width="124" height="42" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
          <path d="M56 42L62 50L68 42Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
          <text x="62" y="26" text-anchor="middle" fill="#2b2f31" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="16" font-weight="600">Hakone</text>
        </g>
      </g>
      <circle class="node-halo" r="22" fill="#c85a44"/>
      <circle class="node" r="11.5" fill="#cb5e47" stroke="#fffdfa" stroke-width="4"/>
    </g>

    <g class="interactive fuji-group" transform="translate(878 398)">
      <circle class="hit-area" r="38"/>
      <circle class="node-halo" r="20" fill="#d59a86"/>
      <circle class="fuji-node" r="10.5" fill="#d59a86" stroke="#fffdfa" stroke-width="4"/>
      <g class="fuji-icon" fill="none" stroke="#be725d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0 26)">
        <path d="M-15 11L0 -9L15 11"/>
        <path d="M-5 -3L4 -9L12 2"/>
      </g>
      <text class="fuji-label" x="0" y="64" text-anchor="middle" fill="#404548" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="24" font-weight="600">Mt. Fuji</text>
    </g>
  </g>

  <g class="interactive" transform="translate(1008 320)">
    <circle class="hit-area" r="38"/>
    <g transform="translate(-56 -96)">
      <g class="tooltip-ui tooltip">
        <rect x="0" y="0" width="112" height="42" rx="18" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4"/>
        <path d="M50 42L56 50L62 42Z" fill="#fff8f3" stroke="#e2c6b8" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="56" y="26" text-anchor="middle" fill="#2b2f31" font-family="'Avenir Next', 'Hiragino Sans', sans-serif" font-size="16" font-weight="600">Tokyo</text>
      </g>
    </g>
    <circle class="node-halo" r="22" fill="#c85a44"/>
    <circle class="node" r="11.5" fill="#cb5e47" stroke="#fffdfa" stroke-width="4"/>
  </g>
</svg>
