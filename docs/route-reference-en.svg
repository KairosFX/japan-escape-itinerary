<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Refined route reference for Japan trip</title>
  <desc id="desc">A city-first route diagram showing Osaka, Kyoto, Odawara, Hakone, and Tokyo on the main line, with a curved optional Mt. Fuji area branch between Hakone and Tokyo.</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#3c2b23" flood-opacity="0.11"/>
    </filter>
    <marker id="routeArrow" markerWidth="17" markerHeight="17" refX="13" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L13 8.5L2 15" fill="none" stroke="#c85a44" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="detourArrow" markerWidth="15" markerHeight="15" refX="11" refY="7.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2L11 7.5L2 13" fill="none" stroke="#dc9e8b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="36" fill="#f6f3ef"/>
  <g filter="url(#panelShadow)">
    <rect x="44" y="44" width="1112" height="472" rx="28" fill="#fffdfa" stroke="#ebdfd3" stroke-width="2"/>
  </g>

  <circle cx="1062" cy="112" r="40" fill="#f3ddd4" opacity="0.04"/>
  <circle cx="124" cy="444" r="48" fill="#dfe8e2" opacity="0.04"/>

  <g font-family="'Avenir Next', 'Hiragino Sans', sans-serif">
    <text x="108" y="118" fill="#c85a44" font-size="18" font-weight="700" letter-spacing="2.8">TRAVEL DIRECTION</text>
    <text x="330" y="118" fill="#c85a44" font-size="22" font-weight="700">→</text>
    <text x="160" y="164" fill="#c85a44" font-size="16" font-weight="700" letter-spacing="2">START</text>
    <text x="1040" y="164" text-anchor="middle" fill="#c85a44" font-size="16" font-weight="700" letter-spacing="2">END</text>
  </g>

  <g fill="none" stroke="#c85a44" stroke-width="8.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M175 322H356" marker-end="url(#routeArrow)"/>
    <path d="M395 322H576" marker-end="url(#routeArrow)"/>
    <path d="M615 322H796" marker-end="url(#routeArrow)"/>
    <path d="M835 322H1016" marker-end="url(#routeArrow)"/>
  </g>

  <g fill="none" stroke="#dc9e8b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 12">
    <path d="M820 336C826 364 858 390 920 404" marker-end="url(#detourArrow)"/>
    <path d="M938 404C984 404 1018 376 1030 340" marker-end="url(#detourArrow)"/>
  </g>

  <g fill="#c85a44" stroke="#fffdfa" stroke-width="4.5">
    <circle cx="160" cy="322" r="14"/>
    <circle cx="380" cy="322" r="14"/>
    <circle cx="600" cy="322" r="14"/>
    <circle cx="820" cy="322" r="14"/>
    <circle cx="1040" cy="322" r="14"/>
    <circle cx="930" cy="406" r="12" fill="#dc9e8b"/>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Avenir Next', 'Hiragino Sans', sans-serif">
    <text x="160" y="210" font-size="42" font-weight="700">Osaka</text>
    <text x="380" y="210" font-size="42" font-weight="700">Kyoto</text>
    <text x="600" y="210" font-size="30" font-weight="580">Odawara</text>
    <text x="820" y="210" font-size="32" font-weight="650">Hakone</text>
    <text x="1040" y="210" font-size="42" font-weight="700">Tokyo</text>
  </g>

  <g fill="#262b2d" text-anchor="middle" font-family="'Avenir Next', 'Hiragino Sans', sans-serif">
    <text x="930" y="454" font-size="28" font-weight="700">Mt. Fuji area</text>
    <text x="930" y="484" font-size="18" font-weight="500" fill="#677173">Optional branch before Tokyo</text>
  </g>
</svg>
