<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-label="Soft Japanese paper scenery with mist, a faded red sun, and a faint Mt. Fuji outline">
  <defs>
    <filter id="mistBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c75245" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#c75245" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c75245" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mistFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hillFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbe2dc" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#cfd8d1" stop-opacity="0.24"/>
    </linearGradient>
  </defs>

  <g opacity="0.88">
